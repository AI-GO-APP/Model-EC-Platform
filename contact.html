<!DOCTYPE html>
<html lang="zh-TW">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>聯絡我們 | 示範商城</title><meta name="description" content="有任何問題？歡迎聯絡示範商城客服團隊。"/><link rel="icon" type="image/svg+xml" href="/favicon.svg"/></head>
<body data-page="contact">
  <header id="site-header"></header>
  <main>
    <div class="container" style="padding:3rem 0 4rem;">
      <h1 data-i18n="contact.title" style="text-align:center;">聯絡我們</h1>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:3rem;margin-top:2rem;max-width:900px;margin-left:auto;margin-right:auto;">
        <!-- 聯絡表單 -->
        <div>
          <h2 data-i18n="contact.form" style="font-size:1.2rem;margin-bottom:1.5rem;">寄送訊息</h2>
          <form onsubmit="return false;">
            <div class="form-group" style="margin-bottom:1rem;">
              <label data-i18n="checkout.name">姓名</label>
              <input type="text" required />
            </div>
            <div class="form-group" style="margin-bottom:1rem;">
              <label data-i18n="checkout.email">電子信箱</label>
              <input type="email" required />
            </div>
            <div class="form-group" style="margin-bottom:1rem;">
              <label data-i18n="contact.subject">主題</label>
              <select>
                <option>商品諮詢</option>
                <option>訂單問題</option>
                <option>退換貨</option>
                <option>合作提案</option>
                <option>其他</option>
              </select>
            </div>
            <div class="form-group" style="margin-bottom:1rem;">
              <label data-i18n="contact.message">訊息內容</label>
              <textarea rows="5" required></textarea>
            </div>
            <button type="submit" class="btn btn--accent btn--full btn--lg" data-i18n="contact.send">送出</button>
          </form>
        </div>
        <!-- 聯絡資訊 -->
        <div>
          <h2 data-i18n="contact.info" style="font-size:1.2rem;margin-bottom:1.5rem;">聯絡資訊</h2>
          <div style="display:flex;flex-direction:column;gap:1.5rem;">
            <div>
              <div style="font-weight:600;margin-bottom:0.3rem;">📍 <span data-i18n="contact.address">地址</span></div>
              <p style="color:var(--color-text-secondary);font-size:0.9rem;">台北市大安區信義路三段 100 號 5F</p>
            </div>
            <div>
              <div style="font-weight:600;margin-bottom:0.3rem;">📞 電話</div>
              <p style="color:var(--color-text-secondary);font-size:0.9rem;">02-1234-5678</p>
            </div>
            <div>
              <div style="font-weight:600;margin-bottom:0.3rem;">✉️ Email</div>
              <p style="color:var(--color-text-secondary);font-size:0.9rem;">hello@demoshop.com</p>
            </div>
            <div>
              <div style="font-weight:600;margin-bottom:0.3rem;" data-i18n="contact.hours">🕐 營業時間</div>
              <p style="color:var(--color-text-secondary);font-size:0.9rem;">週一至週五 10:00 - 18:00<br>週六日及國定假日公休</p>
            </div>
          </div>
          <!-- 地圖佔位 -->
          <div style="background:var(--color-bg-alt);border-radius:var(--radius-lg);aspect-ratio:16/10;margin-top:1.5rem;display:flex;align-items:center;justify-content:center;color:var(--color-text-light);">
            📍 地圖
          </div>
        </div>
      </div>
    </div>
  </main>
  <footer id="site-footer"></footer>
  <script type="module" src="/src/js/main.js"></script>
</body>
</html>
