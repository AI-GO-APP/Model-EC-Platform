<!DOCTYPE html>
<html lang="zh-TW">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>我的帳戶 | 示範商城</title><link rel="icon" type="image/svg+xml" href="/favicon.svg"/></head>
<body data-page="account">
  <header id="site-header"></header>
  <main>
    <div class="container" style="padding:2rem 0 4rem;min-height:60vh;">

      <!-- 未登入：登入/註冊面板 -->
      <div id="auth-panel" style="display:none;">
        <div class="auth-container">
          <!-- Tab 切換 -->
          <div class="auth-tabs">
            <button class="auth-tab active" id="tab-login" data-i18n="account.login">登入</button>
            <button class="auth-tab" id="tab-register" data-i18n="account.register">註冊</button>
          </div>

          <!-- 登入表單 -->
          <form id="login-form" class="auth-form" autocomplete="on">
            <div class="form-group">
              <label for="login-email">Email</label>
              <input type="email" id="login-email" name="email" required autocomplete="email"
                     placeholder="your@email.com"/>
            </div>
            <div class="form-group">
              <label data-i18n="account.password">密碼</label>
              <div class="password-input-wrap">
                <input type="password" id="login-password" name="password" required autocomplete="current-password"
                       placeholder="••••••••"/>
                <button type="button" class="pwd-toggle" data-target="login-password" aria-label="Show password">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
            </div>
            <div id="login-error" class="auth-error" style="display:none;"></div>
            <button type="submit" class="btn btn--primary btn--full" id="login-submit">
              <span data-i18n="account.login">登入</span>
              <span class="btn-spinner" style="display:none;"></span>
            </button>
          </form>

          <!-- 註冊表單 -->
          <form id="register-form" class="auth-form" style="display:none;" autocomplete="on">
            <div class="form-group">
              <label data-i18n="account.displayName">顯示名稱</label>
              <input type="text" id="register-name" name="name" required autocomplete="name"
                     placeholder="王小明"/>
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" id="register-email" name="email" required autocomplete="email"
                     placeholder="your@email.com"/>
            </div>
            <div class="form-group">
              <label data-i18n="account.password">密碼</label>
              <div class="password-input-wrap">
                <input type="password" id="register-password" name="password" required autocomplete="new-password"
                       placeholder="至少 8 個字元" minlength="8"/>
                <button type="button" class="pwd-toggle" data-target="register-password" aria-label="Show password">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
            </div>
            <div class="form-group">
              <label data-i18n="account.confirmPassword">確認密碼</label>
              <div class="password-input-wrap">
                <input type="password" id="register-confirm" name="confirm-password" required autocomplete="new-password"
                       placeholder="再次輸入密碼"/>
                <button type="button" class="pwd-toggle" data-target="register-confirm" aria-label="Show password">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
            </div>
            <div id="register-error" class="auth-error" style="display:none;"></div>
            <button type="submit" class="btn btn--primary btn--full" id="register-submit">
              <span data-i18n="account.register">建立帳戶</span>
              <span class="btn-spinner" style="display:none;"></span>
            </button>
          </form>

          <div class="auth-divider"><span>OR</span></div>
          <p class="auth-note" data-i18n="account.termsNote">
            登入即表示您同意我們的服務條款與隱私權政策
          </p>
        </div>
      </div>

      <!-- 已登入：會員中心 -->
      <div id="member-panel" style="display:none;">
        <h1 data-i18n="account.title">我的帳戶</h1>
        <div class="account-layout">
          <!-- 側邊選單 -->
          <nav class="account-sidebar">
            <button class="account-nav-btn active" data-tab="profile">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <span data-i18n="account.profile">個人資料</span>
            </button>
            <button class="account-nav-btn" data-tab="orders">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>
              <span data-i18n="account.orders">訂單記錄</span>
            </button>
            <button class="account-nav-btn" data-tab="addresses">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              <span data-i18n="account.addresses">收件地址</span>
            </button>
            <a href="/wishlist.html" class="account-nav-btn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
              <span data-i18n="account.wishlist">願望清單</span>
            </a>
            <hr class="account-sidebar-divider"/>
            <button class="account-nav-btn account-nav-btn--danger" id="sidebar-logout">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              <span data-i18n="account.logout">登出</span>
            </button>
          </nav>

          <!-- 主要內容 -->
          <div class="account-content">
            <!-- 個人資料 -->
            <div class="account-tab-content active" id="tab-content-profile">
              <div class="card">
                <h2 data-i18n="account.profile">個人資料</h2>
                <div class="form-grid">
                  <div class="form-group">
                    <label data-i18n="account.displayName">顯示名稱</label>
                    <input type="text" id="profile-name"/>
                  </div>
                  <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="profile-email" disabled/>
                  </div>
                </div>
                <button class="btn btn--primary" id="save-profile" style="margin-top:1rem;">
                  <span data-i18n="account.save">儲存變更</span>
                </button>
              </div>
            </div>

            <!-- 訂單記錄 -->
            <div class="account-tab-content" id="tab-content-orders">
              <div class="card">
                <h2 data-i18n="account.orderHistory">訂單歷史</h2>
                <div id="orders-list" class="orders-list">
                  <div class="empty-state">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-tertiary)" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/></svg>
                    <p data-i18n="account.noOrders">尚無訂單記錄</p>
                  </div>
                </div>
              </div>
            </div>

            <!-- 收件地址 -->
            <div class="account-tab-content" id="tab-content-addresses">
              <div class="card">
                <h2 data-i18n="account.addresses">收件地址</h2>
                <div class="empty-state">
                  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-tertiary)" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                  <p data-i18n="account.noAddresses">收件地址管理功能即將推出</p>
                  <small style="color:var(--color-text-tertiary);">Coming Soon</small>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>
  <footer id="site-footer"></footer>
  <script type="module" src="/src/js/main.js"></script>
  <script type="module" src="/src/js/pages/account.js"></script>
</body>
</html>
