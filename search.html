<!DOCTYPE html>
<html lang="zh-TW">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>搜尋 | 示範商城</title><link rel="icon" type="image/svg+xml" href="/favicon.svg"/></head>
<body data-page="search">
  <header id="site-header"></header>
  <main>
    <div class="container" style="padding:2rem 0 4rem;">
      <div style="max-width:600px;margin:0 auto 2rem;text-align:center;">
        <h1 style="margin-bottom:1rem;" data-i18n="common.search">搜尋商品</h1>
        <input type="search" id="search-input" placeholder="搜尋商品..." data-i18n="common.search" data-i18n-attr="placeholder" style="font-size:1.1rem;padding:0.8rem 1.2rem;" autofocus />
      </div>
      <div id="search-results">
        <p style="text-align:center;color:var(--color-text-secondary);padding:3rem 0;" data-i18n="common.noResults">輸入關鍵字搜尋商品</p>
      </div>
    </div>
  </main>
  <footer id="site-footer"></footer>
  <script type="module" src="/src/js/main.js"></script>
</body>
</html>
